<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanovia</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="/img/Sanovia.icon" type="image/x-icon">
<link rel="icon" type="image/jpeg" sizes="32x32" href="/img/Sanovia.jpeg">
<link rel="apple-touch-icon" href="/img/Sanovia.jpeg">
<script src="https://kit.fontawesome.com/e930c4c006.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()">
      <span></span><span></span><span></span>
    </div>
    <div class="logo">
      <div style="width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,rgba(0,198,167,0.3),rgba(0,168,232,0.3));border:1px solid rgba(0,198,167,0.4);display:flex;align-items:center;justify-content:center;font-size:18px;"><img src="img/Sanovia.jpeg" alt="Sanovia" style="width:100%;height:100%;object-fit:cover;"></div>
      <span class="logo-name">Sanovia</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="lang-selector">
      <span style="font-size:13px;font-weight:600;">FR</span>
      <select>
        <option value="fr">FR</option>
        <option value="bété">BE</option>
        <option value="baoulé">BA</option>
        <option value="dioula">DI</option>
      </select>
    </div>
    <button class="theme-btn" onclick="toggleTheme()" title="Changer le thème"><i class="fa-solid fa-sun" style="color: rgb(42, 91, 177);"></i></button>
    <button class="disconnect-btn" onclick="alert('Déconnexion...')">Se déconnecter</button>
    <div class="avatar">YJ</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR OVERLAY -->
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <button class="new-conv-btn" onclick="newConversation()">
      <span>+</span> Nouvelle conversation
    </button>
    <div class="conversations-list" id="conv-list">
      <!-- rempli dynamiquement -->
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <!-- Welcome ou messages -->
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <div class="input-row">
        <button class="attach-btn" title="Joindre un fichier"><i class="fa-solid fa-file" style="color: rgb(42, 91, 177);"></i></button>
        <textarea id="message-input" placeholder="Tapez votre message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="mic-btn" title="Message vocal"><i class="fa-solid fa-microphone" style="color: rgb(42, 91, 177);"></i></button>
          <button class="send-btn" onclick="sendMessage()" title="Envoyer">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="scrypt.js"></script>
</body>
</html>
